<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation de Présence</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f0f2f5; padding: 20px; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: 40px auto; }
        h2 { color: #4e54c8; margin-bottom: 5px; }
        #infoSeance { color: #666; font-weight: bold; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        button { width: 90%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #218838; }
        #message { margin-top: 20px; font-weight: bold; font-size: 16px; padding: 10px; border-radius: 6px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>✅ Marquer sa présence</h2>
        <div id="infoSeance">Chargement des informations...</div>
        
        <input type="text" id="nomEtudiant" placeholder="Entrez votre Prénom et Nom">
        <button onclick="valider()">Confirmer ma présence</button>
        
        <div id="message"></div>
    </div>

    <script>
        // 1. Récupérer les informations cachées dans le QR Code (dans l'URL)
        const urlParams = new URLSearchParams(window.location.search);
        const matiere = urlParams.get('m');
        const date = urlParams.get('d');
        const typeSeance = urlParams.get('t');

        // 2. Afficher ces informations pour rassurer l'étudiant
        const infoDiv = document.getElementById('infoSeance');
        if (matiere && date && typeSeance) {
            infoDiv.innerText = `Cours : ${matiere} | ${typeSeance} | ${date}`;
        } else {
            infoDiv.innerText = "⚠️ Attention : Veuillez scanner un vrai QR Code.";
            infoDiv.style.color = "red";
        }

        // 3. Fonction pour envoyer la présence au serveur
        async function valider() {
            const nom = document.getElementById('nomEtudiant').value.trim();
            const msgDiv = document.getElementById('message');

            msgDiv.style.display = "block"; // Afficher la zone de message

            // Sécurité : Vérifier si le nom est vide
            if (!nom) {
                msgDiv.style.background = "#ffebee";
                msgDiv.style.color = "#dc3545";
                msgDiv.innerText = "❌ Veuillez entrer votre nom.";
                return;
            }

            // Sécurité : Vérifier si les paramètres du QR code sont bien là
            if (!matiere || !date || !typeSeance) {
                msgDiv.style.background = "#ffebee";
                msgDiv.style.color = "#dc3545";
                msgDiv.innerText = "❌ Erreur : Veuillez scanner depuis le téléphone.";
                return;
            }

            try {
                msgDiv.style.background = "#fff3cd";
                msgDiv.style.color = "#856404";
                msgDiv.innerText = "⏳ Enregistrement en cours...";

                // Envoyer les données au serveur (votre server.js)
                const res = await fetch('/valider-presence', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nom: nom, date: date, matiere: matiere, typeSeance: typeSeance })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    msgDiv.style.background = "#d4edda";
                    msgDiv.style.color = "#155724";
                    msgDiv.innerText = "✅ " + data.message;
                    document.getElementById('nomEtudiant').value = ""; // Vider la case après succès
                } else {
                    msgDiv.style.background = "#ffebee";
                    msgDiv.style.color = "#dc3545";
                    msgDiv.innerText = "❌ " + data.error; // Ex: "Étudiant non trouvé"
                }
            } catch (error) {
                msgDiv.style.background = "#ffebee";
                msgDiv.style.color = "#dc3545";
                msgDiv.innerText = "❌ Erreur de connexion au serveur.";
            }
        }
    </script>
</body>
</html>

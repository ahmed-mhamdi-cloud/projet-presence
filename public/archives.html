<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Archives</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .seance-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 10px solid #4e54c8; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #f8f9fa; }
        .present { color: green; font-weight: bold; }
        .absent { color: red; }
    </style>
</head>
<body>
    <button onclick="window.location.href='professeur.html'">⬅ Retour</button>
    <h1>📂 Historique des présences</h1>
    <div id="list">Chargement...</div>

    <script>
        async function load() {
            const res = await fetch('/archives');
            const data = await res.json();
            const container = document.getElementById('list');
            container.innerHTML = "";

            data.forEach(s => {
                const card = document.createElement('div');
                card.className = 'seance-card';
                
                let rows = s.etudiants.map(e => `
                    <tr>
                        <td>${e.nom}</td>
                        <td class="${e.s1 === 'Présent' ? 'present' : 'absent'}">${e.s1 === 'Présent' ? '✅' : '❌'}</td>
                        <td class="${e.s2 === 'Présent' ? 'present' : 'absent'}">${e.s2 === 'Présent' ? '✅' : '❌'}</td>
                    </tr>
                `).join('');

                card.innerHTML = `
                    <h3>📖 ${s.matiere} | 🗓 ${s.date}</h3>
                    <table>
                        <tr><th>Étudiant</th><th>Séance 1</th><th>Séance 2</th></tr>
                        ${rows}
                    </table>
                `;
                container.appendChild(card);
            });
        }
        load();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Archives - Historique</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: auto; }
        .btn-retour { background: white; color: #4e54c8; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .seance-card { background: white; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 8px solid #4e54c8; }
        .header-card { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .header-card h2 { margin: 0; color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #f8f9fa; color: #555; }
        .present { color: #28a745; font-weight: bold; background: #e8f5e9; padding: 5px 10px; border-radius: 15px; }
        .absent { color: #dc3545; font-weight: bold; background: #ffebee; padding: 5px 10px; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="professeur.html" class="btn-retour">⬅ Retour au menu</a>
        <h1>📂 Archives Complètes</h1>
        <div id="list">Chargement des données...</div>
    </div>

    <script>
        async function load() {
            try {
                const res = await fetch('/archives');
                const data = await res.json();
                const container = document.getElementById('list');
                
                if(data.length === 0) {
                    container.innerHTML = "<p>Aucune séance enregistrée. Démarrez un appel !</p>";
                    return;
                }

                container.innerHTML = "";

                data.forEach(s => {
                    const card = document.createElement('div');
                    card.className = 'seance-card';
                    
                    // Création des lignes pour chaque étudiant de la liste
                    let rows = s.etudiants.map(e => `
                        <tr>
                            <td><strong>${e.nom}</strong></td>
                            <td><span class="${e.s1 === 'Présent' ? 'present' : 'absent'}">${e.s1 === 'Présent' ? '✅ Présent' : '❌ Absent'}</span></td>
                            <td><span class="${e.s2 === 'Présent' ? 'present' : 'absent'}">${e.s2 === 'Présent' ? '✅ Présent' : '❌ Absent'}</span></td>
                        </tr>
                    `).join('');

                    card.innerHTML = `
                        <div class="header-card">
                            <h2>📖 ${s.matiere}</h2>
                            <span style="font-weight:bold; color:#666;">🗓 ${s.date}</span>
                        </div>
                        <table>
                            <thead>
                                <tr><th>Nom de l'étudiant</th><th>Séance 1</th><th>Séance 2</th></tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                document.getElementById('list').innerHTML = "<p style='color:red;'>Erreur de chargement des archives.</p>";
            }
        }
        load();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archives</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        .badge { padding: 5px 10px; border-radius: 4px; font-weight: bold; }
        .badge-present { background: #d1e7dd; color: #0f5132; }
        .badge-absent { background: #f8d7da; color: #842029; }
    </style>
</head>
<body>
    <h2>📂 Archives des Présences</h2>
    <div id="listeArchives">Chargement...</div>

    <script>
        async function load() {
            const res = await fetch('/archives');
            const data = await res.json();
            const container = document.getElementById('listeArchives');
            container.innerHTML = '';

            data.forEach(s => {
                let rows = '';
                s.etudiants.forEach(e => {
                    rows += `
                        <tr>
                            <td>${e.nom}</td>
                            <td><span class="badge ${e.s1 === 'Présent' ? 'badge-present' : 'badge-absent'}">${e.s1}</span></td>
                            <td><span class="badge ${e.s2 === 'Présent' ? 'badge-present' : 'badge-absent'}">${e.s2}</span></td>
                        </tr>`;
                });

                container.innerHTML += `
                    <div class="card">
                        <h3>📘 ${s.matiere} - ${s.date}</h3>
                        <table>
                            <thead><tr><th>Nom</th><th>Séance 1</th><th>Séance 2</th></tr></thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>`;
            });
        }
        load();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Portail Professeur</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        #msgInfo { display: none; color: white; background: #28a745; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; }
        select, input, button { width: 90%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #ddd; font-size: 16px; }
        button { background: #4e54c8; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-archive { background: white; color: #4e54c8; border: 2px solid #4e54c8; text-decoration: none; display: inline-block; padding: 10px 20px; border-radius: 6px; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="msgInfo"></div>
    <div class="card">
        <h2>🚀 Démarrer une Séance</h2>
        <select id="matiere">
            <option value="Mathématiques">Mathématiques</option>
            <option value="Physique">Physique</option>
            <option value="Autre">Nouvelle Matière...</option>
        </select>
        <input type="text" id="nomAutre" placeholder="Nom de la matière" style="display:none;">
        
        <select id="typeSeance">
            <option value="Séance 1">Séance 1</option>
            <option value="Séance 2">Séance 2</option>
        </select>
        
        <input type="date" id="dateS">
        <button onclick="lancer()">Démarrer l'appel</button>
        <br>
        <a href="archives.html" class="btn-archive">📂 Voir les Archives</a>
    </div>

    <div id="qrBox" class="card" style="display:none; margin-top:20px;">
        <h3 id="qrTxt" style="color:#4e54c8;"></h3>
        <div id="qrcode" style="display:flex; justify-content:center; margin-bottom: 15px; min-height: 200px;"></div>
        <p>Demandez aux étudiants de scanner ce code</p>
    </div>

    <script>
        document.getElementById('dateS').valueAsDate = new Date();
        document.getElementById('matiere').onchange = function() {
            document.getElementById('nomAutre').style.display = (this.value === 'Autre') ? 'block' : 'none';
        };

        let monQRCode = null; // Variable globale pour stocker le QR Code

        async function lancer() {
            const mat = document.getElementById('matiere').value === 'Autre' ? document.getElementById('nomAutre').value : document.getElementById('matiere').value;
            const type = document.getElementById('typeSeance').value;
            const date = document.getElementById('dateS').value;

            // Envoi au serveur pour créer la liste des étudiants
            await fetch('/demarrer-seance', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ matiere: mat, date: date, typeSeance: type })
            });

            // Afficher le message vert
            const msg = document.getElementById('msgInfo');
            msg.innerText = `✅ ${type} démarrée pour ${mat} !`;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 4000);

            // Gérer l'affichage du QR Code
            document.getElementById('qrBox').style.display = 'block';
            document.getElementById('qrTxt').innerText = `${mat} - ${type}`;
            
            const lienPourEtudiant = `https://${window.location.host}/etudiant.html?m=${encodeURIComponent(mat)}&d=${date}&t=${encodeURIComponent(type)}`;

            // Génération sécurisée du QR Code
            if (monQRCode === null) {
                // S'il n'existe pas encore, on le crée
                monQRCode = new QRCode(document.getElementById("qrcode"), { 
                    width: 200, 
                    height: 200,
                    text: lienPourEtudiant
                });
            } else {
                // S'il existe déjà, on l'efface proprement et on le refait
                monQRCode.clear();
                monQRCode.makeCode(lienPourEtudiant);
            }
        }
    </script>
</body>
</html>

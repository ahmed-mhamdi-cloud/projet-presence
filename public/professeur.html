<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Portail Professeur - Archives</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #4e54c8; --secondary: #8f94fb; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; text-align: center; margin: 0; }
        header { background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { max-width: 1000px; margin: 20px auto; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: var(--primary); color: white; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        .status-present { color: #28a745; font-weight: bold; }
        .status-absent { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>
    <header><h1>🎓 Tableau de Bord Professeur</h1></header>
    <div class="container">
        <div class="card">
            <input type="text" id="matiere" placeholder="Nom de la matière" value="Mathématiques">
            <input type="date" id="dateCours">
            <button onclick="demarrerAppel()">🚀 Démarrer et Enregistrer</button>
        </div>

        <div id="qrSection" style="display:none;" class="card">
            <div id="qrcode" style="display: flex; justify-content: center; margin-bottom: 10px;"></div>
            <p>Code actif - Mise à jour auto</p>
        </div>

        <div class="card">
            <h2>Liste en direct</h2>
            <table>
                <thead><tr><th>Heure</th><th>Étudiant</th><th>Statut</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        document.getElementById('dateCours').valueAsDate = new Date();
        let qrcode = new QRCode(document.getElementById("qrcode"), { width: 200, height: 200 });

        async function demarrerAppel() {
            const matiere = document.getElementById('matiere').value;
            const date = document.getElementById('dateCours').value;

            // 1. On crée la séance dans MongoDB
            await fetch('/demarrer-seance', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ matiere, date })
            });

            // 2. On affiche le QR Code
            document.getElementById('qrSection').style.display = 'block';
            genererQR();
            
            // 3. On charge le tableau
            chargerTableau();
            setInterval(chargerTableau, 3000); // Rafraîchir toutes les 3s
            setInterval(genererQR, 10000); // Nouveau QR toutes les 10s
        }

        function genererQR() {
            const token = Math.random().toString(36).substr(2, 9);
            qrcode.makeCode("https://" + window.location.host + "/etudiant.html?token=" + token);
        }

        async function chargerTableau() {
            const res = await fetch('/liste-officielle');
            const etudiants = await res.json();
            const body = document.getElementById('tableBody');
            body.innerHTML = "";
            
            etudiants.forEach(e => {
                body.innerHTML += `<tr><td>--:--</td><td>${e.nom}</td><td class="status-absent">🔴 Absent</td></tr>`;
            });
        }
    </script>
</body>
</html>

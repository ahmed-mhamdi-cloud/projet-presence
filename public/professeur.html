<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Portail Professeur</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        #msgInfo { display: none; color: white; background: #28a745; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; }
        select, input, button { width: 90%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #ddd; }
        button { background: #4e54c8; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="msgInfo"></div>
    <div class="card">
        <h2>🚀 Démarrer une Séance</h2>
        <select id="matiere">
            <option value="Mathématiques">Mathématiques</option>
            <option value="Physique">Physique</option>
            <option value="Autre">Nouvelle Matière...</option>
        </select>
        <input type="text" id="nomAutre" placeholder="Nom de la matière" style="display:none;">
        
        <select id="typeSeance">
            <option value="Séance 1">Séance 1</option>
            <option value="Séance 2">Séance 2</option>
        </select>
        
        <input type="date" id="dateS">
        <button onclick="lancer()">Démarrer l'appel</button>
        <br><br>
        <a href="archives.html">📂 Voir les Archives</a>
    </div>

    <div id="qrBox" class="card" style="display:none; margin-top:20px;">
        <div id="qrcode" style="display:flex; justify-content:center;"></div>
        <p id="qrTxt"></p>
    </div>

    <script>
        document.getElementById('dateS').valueAsDate = new Date();
        document.getElementById('matiere').onchange = function() {
            document.getElementById('nomAutre').style.display = (this.value === 'Autre') ? 'block' : 'none';
        };

        async function lancer() {
            const mat = document.getElementById('matiere').value === 'Autre' ? document.getElementById('nomAutre').value : document.getElementById('matiere').value;
            const type = document.getElementById('typeSeance').value;
            const date = document.getElementById('dateS').value;

            await fetch('/demarrer-seance', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ matiere: mat, date: date, typeSeance: type })
            });

            // Message de confirmation
            const msg = document.getElementById('msgInfo');
            msg.innerText = `✅ ${type} démarrée pour ${mat} !`;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 4000);

            // QR Code
            document.getElementById('qrBox').style.display = 'block';
            document.getElementById('qrTxt').innerText = `Scan pour : ${mat} (${type})`;
            new QRCode(document.getElementById("qrcode"), { width: 180, height: 180 }).makeCode(
                `https://${window.location.host}/etudiant.html?m=${mat}&d=${date}&t=${type}`
            );
        }
    </script>
</body>
</html>

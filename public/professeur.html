<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interface Professeur — Présence QR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg:       #0a0e1a;
    --surface:  #111827;
    --border:   #1e2d45;
    --accent:   #00d4ff;
    --accent2:  #7c3aed;
    --success:  #10b981;
    --danger:   #ef4444;
    --warn:     #f59e0b;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --mono:     'Space Mono', monospace;
    --sans:     'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 2rem 1rem;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(0,212,255,0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(124,58,237,0.07) 0%, transparent 60%);
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  header p {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.75rem;
    margin-top: 0.4rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem;
    max-width: 520px;
    margin: 0 auto 1.5rem;
  }

  .card h2 {
    font-size: 0.75rem;
    font-family: var(--mono);
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 1.25rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  label {
    font-size: 0.7rem;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  input, select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.85rem;
    padding: 0.65rem 0.9rem;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.08);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.8rem 1.5rem;
    border-radius: 10px;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    width: 100%;
    margin-top: 0.75rem;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #0090b3);
    color: #000;
  }

  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,212,255,0.3); }

  .btn-renew {
    background: transparent;
    border: 1px solid var(--accent2);
    color: var(--accent2);
  }

  .btn-renew:hover { background: rgba(124,58,237,0.1); }

  .btn-logs {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.75rem;
    padding: 0.5rem 1rem;
    margin-top: 0.5rem;
  }

  .btn-logs:hover { border-color: var(--warn); color: var(--warn); }

  /* QR Zone */
  #qr-zone {
    display: none;
    text-align: center;
  }

  #qrcode {
    display: inline-block;
    padding: 16px;
    background: #fff;
    border-radius: 12px;
    margin: 1rem 0;
  }

  /* Timer */
  #timer-bar {
    height: 6px;
    border-radius: 3px;
    background: var(--border);
    overflow: hidden;
    margin: 0.75rem 0;
  }

  #timer-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--success), var(--accent));
    transition: width 1s linear, background 1s;
  }

  #timer-text {
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  /* Badges sécurité */
  .badge-sec {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-family: var(--mono);
    font-size: 0.7rem;
    padding: 0.3rem 0.7rem;
    border-radius: 99px;
    margin: 0.25rem;
  }

  .badge-ok  { background: rgba(16,185,129,0.1);  color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
  .badge-warn { background: rgba(245,158,11,0.1); color: var(--warn);    border: 1px solid rgba(245,158,11,0.3); }
  .badge-err  { background: rgba(239,68,68,0.1);  color: var(--danger);  border: 1px solid rgba(239,68,68,0.3); }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    padding: 1rem 1.5rem;
    border-radius: 12px;
    font-family: var(--mono);
    font-size: 0.85rem;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.3s;
    z-index: 999;
    max-width: 320px;
  }

  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.ok   { background: rgba(16,185,129,0.9);  color: #fff; }
  #toast.err  { background: rgba(239,68,68,0.9);   color: #fff; }

  /* Logs */
  #logs-panel {
    display: none;
    margin-top: 1rem;
  }

  .log-entry {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.6rem 0.8rem;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 0.7rem;
    margin-bottom: 0.4rem;
    background: rgba(239,68,68,0.06);
    border: 1px solid rgba(239,68,68,0.15);
    color: var(--danger);
    word-break: break-all;
  }

  .log-time { color: var(--muted); white-space: nowrap; margin-left: 0.5rem; flex-shrink: 0; }

  /* Responsive */
  @media (max-width: 480px) {
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>Interface Professeur</h1>
  <p>Système de Présence par QR Code — Sécurisé</p>
</header>

<!-- Formulaire -->
<div class="card">
  <h2>⚙ Configurer la Séance</h2>

  <div class="form-row">
    <div class="form-group">
      <label>Matière</label>
      <input type="text" id="matiere" placeholder="ex: Mathématiques" />
    </div>
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="date" />
    </div>
  </div>

  <div class="form-group">
    <label>Type de Séance à ouvrir</label>
    <select id="typeSeance">
      <option value="Seance 1">Séance 1</option>
      <option value="Seance 2">Séance 2</option>
    </select>
  </div>

  <button class="btn btn-primary" onclick="demarrerSeance()">
    ▶ Générer le QR Code
  </button>

  <!-- Badges de sécurité actifs -->
  <div style="margin-top:1rem; text-align:center;">
    <span class="badge-ok">✔ Token 15 min</span>
    <span class="badge-ok">✔ IP unique / scan</span>
    <span class="badge-ok">✔ Même réseau WiFi</span>
    <span class="badge-ok">✔ Anti-brute-force</span>
  </div>
</div>

<!-- Zone QR Code -->
<div class="card" id="qr-zone">
  <h2>📱 QR Code Actif</h2>

  <div id="qrcode"></div>

  <div id="timer-bar"><div id="timer-fill" style="width:100%"></div></div>
  <p id="timer-text">⏳ Expiration dans <span id="countdown">15:00</span></p>

  <button class="btn btn-renew" onclick="renouvelerToken()">
    🔄 Renouveler le QR Code (15 min)
  </button>

  <button class="btn btn-logs" onclick="toggleLogs()">
    🛡 Voir les logs de sécurité
  </button>

  <div id="logs-panel">
    <div style="font-family:var(--mono);font-size:0.7rem;color:var(--muted);margin:0.75rem 0 0.5rem;">
      TENTATIVES BLOQUÉES :
    </div>
    <div id="logs-list"></div>
  </div>
</div>

<div id="toast"></div>

<script>
  // Remplir la date du jour par défaut
  document.getElementById('date').valueAsDate = new Date();

  let timerInterval = null;
  let expiryDate    = null;
  let currentMatiere, currentDate, currentTypeSeance;

  function toast(msg, type = 'ok') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => { t.className = ''; }, 3500);
  }

  async function demarrerSeance() {
    const matiere    = document.getElementById('matiere').value.trim();
    const date       = document.getElementById('date').value;
    const typeSeance = document.getElementById('typeSeance').value;

    if (!matiere || !date) return toast('Veuillez remplir la matière et la date.', 'err');

    currentMatiere    = matiere;
    currentDate       = date;
    currentTypeSeance = typeSeance;

    try {
      const res  = await fetch('/demarrer-seance', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ matiere, date })
      });
      const data = await res.json();
      if (!res.ok) return toast(data.error, 'err');

      afficherQR(data.token, matiere, date, typeSeance, data.expiry);
      toast('✅ Séance démarrée — QR Code actif 15 min');
    } catch (e) {
      toast('Erreur réseau.', 'err');
    }
  }

  async function renouvelerToken() {
    if (!currentMatiere || !currentDate) return toast('Démarrez d\'abord une séance.', 'err');

    try {
      const res  = await fetch('/demarrer-seance', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ matiere: currentMatiere, date: currentDate })
      });
      const data = await res.json();
      if (!res.ok) return toast(data.error, 'err');

      afficherQR(data.token, currentMatiere, currentDate, currentTypeSeance, data.expiry);
      toast('🔄 QR Code renouvelé — encore 15 min');
    } catch (e) {
      toast('Erreur réseau.', 'err');
    }
  }

  function afficherQR(token, matiere, date, typeSeance, expiry) {
    // Construire l'URL encodée dans le QR
    const baseURL = window.location.origin;
    const params  = new URLSearchParams({ token, matiere, date, typeSeance });
    const url     = `${baseURL}/etudiant.html?${params}`;

    // (Re)générer le QR code
    const qrDiv = document.getElementById('qrcode');
    qrDiv.innerHTML = '';
    new QRCode(qrDiv, {
      text:          url,
      width:         220,
      height:        220,
      colorDark:     '#000000',
      colorLight:    '#ffffff',
      correctLevel:  QRCode.CorrectLevel.H
    });

    // Afficher la zone
    document.getElementById('qr-zone').style.display = 'block';

    // Lancer le timer
    expiryDate = new Date(expiry);
    lancerTimer();
  }

  function lancerTimer() {
    if (timerInterval) clearInterval(timerInterval);

    const TOTAL = 15 * 60 * 1000;

    timerInterval = setInterval(() => {
      const restant  = expiryDate - Date.now();
      const pct      = Math.max(0, (restant / TOTAL) * 100);
      const minutes  = Math.max(0, Math.floor(restant / 60000));
      const secondes = Math.max(0, Math.floor((restant % 60000) / 1000));

      document.getElementById('timer-fill').style.width = `${pct}%`;

      // Couleur selon urgence
      if (pct < 20) {
        document.getElementById('timer-fill').style.background = 'linear-gradient(90deg,#ef4444,#f59e0b)';
      } else if (pct < 50) {
        document.getElementById('timer-fill').style.background = 'linear-gradient(90deg,#f59e0b,#eab308)';
      }

      document.getElementById('countdown').textContent =
        `${String(minutes).padStart(2,'0')}:${String(secondes).padStart(2,'0')}`;

      if (restant <= 0) {
        clearInterval(timerInterval);
        document.getElementById('countdown').textContent = 'EXPIRÉ';
        toast('⚠ QR Code expiré. Veuillez renouveler.', 'err');
      }
    }, 1000);
  }

  async function toggleLogs() {
    const panel = document.getElementById('logs-panel');
    if (panel.style.display === 'block') {
      panel.style.display = 'none'; return;
    }
    if (!currentMatiere || !currentDate) return;

    try {
      const res  = await fetch(`/securite-logs?matiere=${encodeURIComponent(currentMatiere)}&date=${encodeURIComponent(currentDate)}`);
      const data = await res.json();

      const list = document.getElementById('logs-list');
      list.innerHTML = '';

      if (!data.tentativesBloquees || data.tentativesBloquees.length === 0) {
        list.innerHTML = '<div style="font-family:var(--mono);font-size:0.75rem;color:var(--success);padding:0.5rem;">✅ Aucune tentative suspecte.</div>';
      } else {
        data.tentativesBloquees.slice(-15).reverse().forEach(t => {
          const d = document.createElement('div');
          d.className = 'log-entry';
          d.innerHTML = `
            <span>${t.ip} — ${t.raison}</span>
            <span class="log-time">${new Date(t.date).toLocaleTimeString()}</span>
          `;
          list.appendChild(d);
        });
      }

      panel.style.display = 'block';
    } catch (e) {
      toast('Impossible de charger les logs.', 'err');
    }
  }
</script>
</body>
</html>
